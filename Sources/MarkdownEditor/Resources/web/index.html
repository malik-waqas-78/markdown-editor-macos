<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<link id="hljs-theme" rel="stylesheet" href="hljs-light.css">
<style>
  :root { color-scheme: light dark; }
  html, body {
    margin: 0;
    padding: 0;
    font: -apple-system-body;
    -webkit-text-size-adjust: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    padding: 28px 36px 80px;
    color: #1d1d1f;
    background: #ffffff;
    word-wrap: break-word;
  }
  body.dark { color: #e6e6e6; background: #1e1e1e; }
  #content { max-width: 820px; margin: 0 auto; }
  h1, h2, h3, h4, h5, h6 { font-weight: 700; line-height: 1.25; margin: 1.6em 0 0.6em; }
  h1 { font-size: 2em; border-bottom: 1px solid rgba(128,128,128,.25); padding-bottom: .3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid rgba(128,128,128,.2); padding-bottom: .3em; }
  h3 { font-size: 1.25em; }
  p { margin: 0 0 1em; }
  a { color: #0a84ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    font-family: "SF Mono", ui-monospace, Menlo, Monaco, monospace;
    font-size: .88em;
    background: rgba(128,128,128,.16);
    padding: .15em .4em;
    border-radius: 5px;
  }
  pre { background: rgba(128,128,128,.12); padding: 14px 16px; border-radius: 10px; overflow: auto; }
  pre code { background: none; padding: 0; font-size: .85em; }
  blockquote {
    margin: 0 0 1em; padding: .2em 1em;
    border-left: 4px solid rgba(128,128,128,.4);
    color: rgba(128,128,128,1);
  }
  table { border-collapse: collapse; margin: 0 0 1em; width: 100%; }
  th, td { border: 1px solid rgba(128,128,128,.35); padding: 7px 12px; }
  th { background: rgba(128,128,128,.12); }
  img { max-width: 100%; border-radius: 8px; }
  hr { border: none; border-top: 1px solid rgba(128,128,128,.3); margin: 1.8em 0; }
  ul, ol { padding-left: 1.6em; }
  input[type="checkbox"] { margin-right: .5em; }
</style>
</head>
<body>
<div id="content"></div>
<script>
  marked.setOptions({ gfm: true, breaks: false });

  window.__setTheme = function (dark) {
    document.body.classList.toggle('dark', dark);
    document.getElementById('hljs-theme').href = dark ? 'hljs-dark.css' : 'hljs-light.css';
  };

  window.__render = function (md, dark) {
    window.__setTheme(dark);
    const scrollPct = (window.scrollY) / Math.max(1, document.body.scrollHeight - window.innerHeight);
    document.getElementById('content').innerHTML = marked.parse(md || '');
    document.querySelectorAll('#content pre code').forEach(function (el) {
      try { hljs.highlightElement(el); } catch (e) {}
    });
    // Preserve relative scroll position so typing doesn't jump the preview.
    const target = scrollPct * Math.max(0, document.body.scrollHeight - window.innerHeight);
    window.scrollTo(0, target);
  };
</script>
</body>
</html>
